# Place this file at:  .github/workflows/autofill-scores.yml
name: Auto-fill World Cup scores

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min (~96 calls/day, under API-Football's free 100/day cap)
  workflow_dispatch: {}        # lets you run it manually from the Actions tab

# avoid overlapping runs
concurrency:
  group: autofill-scores
  cancel-in-progress: false

jobs:
  fill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Fill finished scores
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
        run: node autofill-scores.mjs
