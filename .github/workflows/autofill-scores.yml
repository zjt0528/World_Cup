# Place this file at:  .github/workflows/autofill-scores.yml
name: Auto-fill World Cup scores

on:
  schedule:
    - cron: "*/5 * * * *"    # every 5 minutes — GitHub's minimum; still best-effort timing
  workflow_dispatch: {}        # lets you run it manually from the Actions tab

# avoid overlapping runs
concurrency:
  group: autofill-scores
  cancel-in-progress: false

jobs:
  fill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Fill finished scores
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          WC_EMAIL: ${{ secrets.WC_EMAIL }}
          WC_PASSWORD: ${{ secrets.WC_PASSWORD }}
        run: node autofill-scores.mjs
